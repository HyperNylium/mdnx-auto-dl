# Remote-specials override file.
#
# Lists episodes that the per-service special-episode detection misses.
#
# Structure:
#   <downloader>:
#     <service>:
#       <series_id>:
#         <season_key>: [<entry>, <entry>, ...]
#
# Where:
#   downloader  -> "mdnx" or "zlo"
#   service     -> mdnx: crunchyroll | hidive | adn
#                  zlo : crunchyroll | hidive | adn
#   series_id   -> the series id the parser already returns
#   season_key  -> "S<n>" using the service's season number (NOT the post-renumber S1/S2/S3 the parser may map to).
#   entry       -> for MDNX:  a number ("7") or a range ("3-5")
#                  for ZLO:   a number ("7"), a range ("3-5"), or an episode id tagged with the "id:" prefix (e.g. "id:GWDU8GV0X").
#
# If you would like to add a series to this list but dont understand how to,
# feel free to open an issue with the series/episode URL and i can do the change for you ;)
#
# Keep in mind that github has a 5min cache timeout. so even if i do the change, you may need to take a coffe break.

mdnx:
  crunchyroll:

    # Kaiju No. 8
    GG5H5XQ7D:
      S2: ["13"]  # skip "Kaiju No. 8: Mission Recon"
      S3: ["14"]  # skip "Hoshina's Day Off"

    # Saga of tanya the evil
    GR9P57W96:
      S3: ["14"]  # skip "Saga of Tanya the Evil Operation Desert Pasta"

    # Mushoku Tensei Jobless Reincarnation
    G24H1N3MP:
      S1: ["24"] # skip "Eris the Goblin Slayer"
      S2: ["25"] # skip "Guardian Fitz"

    # Miss Kobayashi's Dragon Maid
    G6497Z43Y:
      S3: ["26-38"] # skip "Short Animation Series" season
      S0: ["39", "40"]  # skip "OVAs" season

    # Summer Pockets
    G0XHWM17X:
      S2: ["27-30"] # skip "Summer Pockets Season 1: Omnibus" season

    # The Dark History of the Reincarnated Villainess
    GG5H5XQZQ:
      S1: ["13"] # skip "Yomi, Jealousy, and a Birthday / Iana and Sol's Feverish Day"

  hidive: {}
  adn: {}

zlo:
  crunchyroll:

    # Kaiju No. 8
    GG5H5XQ7D:
      S2: ["1"]  # skip "Kaiju No. 8: Mission Recon"
      S3: ["1"]  # skip "Hoshina's Day Off"

    # Saga of tanya the evil
    GR9P57W96:
      S3: ["1"]  # skip "Saga of Tanya the Evil Operation Desert Pasta"

    # Mushoku Tensei Jobless Reincarnation
    G24H1N3MP:
      S1: ["24"] # skip "Eris the Goblin Slayer"

    # Miss Kobayashi's Dragon Maid
    G6497Z43Y:
      S3: ["1-13"] # skip "Short Animation Series" season
      S0: ["14", "13"]  # skip "OVAs" season

    # Summer Pockets
    G0XHWM17X:
      S2: ["1-4"] # skip "Summer Pockets Season 1: Omnibus" season

    # The Dark History of the Reincarnated Villainess
    GG5H5XQZQ:
      S1: ["13"] # skip "Yomi, Jealousy, and a Birthday / Iana and Sol's Feverish Day"

  hidive: {}
  adn: {}
