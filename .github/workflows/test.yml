name: Lint test

on:
  push:
    branches: [ master, dev ]
    paths:
      - "*.py"
      - "**/*.py"
  pull_request:
    branches: [ master, dev ]
    paths:
      - "*.py"
      - "**/*.py"

jobs:
  ruff-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
      - uses: astral-sh/ruff-action@v4.1.0
        with:
          version: "latest"
          args: check .
