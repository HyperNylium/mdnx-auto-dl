name: Build image on Release
run-name: "Build Docker image for ${{ github.event.release.name }}"

on:
  release:
    types: [ published ]

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get release git info
        id: git
        shell: bash
        run: |
          set -euo pipefail
          echo "SHA=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "SHA7=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"
          echo "CREATED=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "REF_NAME=${GITHUB_REF}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image/tag vars
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          REPO_LC="${GITHUB_REPOSITORY,,}"
          echo "IMAGE=ghcr.io/${REPO_LC}" >> "$GITHUB_OUTPUT"
          TAG="${{ github.event.release.tag_name }}"
          echo "TAG=${TAG}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build & push (amd64)
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          pull: true
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          no-cache: true
          tags: |
            ${{ steps.vars.outputs.IMAGE }}:${{ steps.vars.outputs.VERSION }}
            ${{ steps.vars.outputs.IMAGE }}:latest
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.description=${{ github.event.repository.description }}
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.licenses=${{ github.event.repository.license.spdx_id }}
            org.opencontainers.image.created=${{ steps.git.outputs.CREATED }}
            org.opencontainers.image.revision=${{ steps.git.outputs.SHA }}
            org.opencontainers.image.ref.name=${{ steps.git.outputs.REF_NAME }}
            org.opencontainers.image.version=${{ steps.vars.outputs.VERSION }}

      - name: Create release checksum file
        shell: bash
        run: |
          DIGEST="${{ steps.docker_build.outputs.digest }}"
          {
            echo "image=${{ steps.vars.outputs.IMAGE }}"
            echo "tag=${{ steps.vars.outputs.VERSION }}"
            echo "latest=true"
            echo "digest=${DIGEST}"
          } > release-sha256.txt
          echo "Wrote release-sha256.txt:"
          cat release-sha256.txt

      - name: Upload checksum to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: release-sha256.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
