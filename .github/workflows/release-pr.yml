name: Build PR image

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number"
        required: true
        type: string

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  build-and-push-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch PR info
        id: pr
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail

          PR_JSON="$(gh api repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER})"

          echo "HEAD_SHA=$(jq -r '.head.sha' <<<"$PR_JSON")" >> "$GITHUB_OUTPUT"
          echo "HEAD_REF=$(jq -r '.head.ref' <<<"$PR_JSON")" >> "$GITHUB_OUTPUT"
          echo "HEAD_REPO=$(jq -r '.head.repo.full_name' <<<"$PR_JSON")" >> "$GITHUB_OUTPUT"
          echo "PR_NUMBER=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.pr.outputs.HEAD_REPO }}
          ref: ${{ steps.pr.outputs.HEAD_SHA }}

      - name: Get PR git info
        id: git
        shell: bash
        run: |
          set -euo pipefail
          echo "SHA=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "SHA7=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"
          echo "CREATED=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "REF_NAME=refs/pull/${{ steps.pr.outputs.PR_NUMBER }}/head" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image vars
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          REPO_LC="${GITHUB_REPOSITORY,,}"
          echo "IMAGE=ghcr.io/${REPO_LC}" >> "$GITHUB_OUTPUT"
          echo "TAG=pr-${{ steps.pr.outputs.PR_NUMBER }}" >> "$GITHUB_OUTPUT"

      - name: Build & push (amd64)
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          pull: true
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          no-cache: true
          tags: |
            ${{ steps.vars.outputs.IMAGE }}:${{ steps.vars.outputs.TAG }}
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.description=${{ github.event.repository.description }}
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.licenses=${{ github.event.repository.license.spdx_id }}
            org.opencontainers.image.created=${{ steps.git.outputs.CREATED }}
            org.opencontainers.image.revision=${{ steps.git.outputs.SHA }}
            org.opencontainers.image.ref.name=${{ steps.git.outputs.REF_NAME }}
            org.opencontainers.image.version=${{ steps.vars.outputs.TAG }}

      - name: Comment on PR
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          gh api \
            --method POST \
            repos/${GITHUB_REPOSITORY}/issues/${{ steps.pr.outputs.PR_NUMBER }}/comments \
            -f body=$'Docker image for this PR has been built. You can test it out here:\n```bash\ndocker pull ${{ steps.vars.outputs.IMAGE }}:${{ steps.vars.outputs.TAG }}\n```'